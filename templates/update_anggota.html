<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Anggota - Pustaka Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { amber: { 50: '#fdf2f2', 100: '#f9dada', 700: '#800000', 800: '#660000', 900: '#4a0404' } } } } };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="flex min-h-screen">

    <aside class="sidebar w-64 fixed h-full text-white flex flex-col shadow-xl z-20">
        <div class="p-6 border-b border-white/10 flex items-center space-x-3">
            <i class="fas fa-book-open logo-mark"></i>
            <span class="serif text-2xl font-bold tracking-wider">PUSTAKA</span>
        </div>

        <nav class="flex-1 mt-6 px-4 space-y-2">
            <a href="{{url_for('auth.dashboard')}}" class="nav-item flex items-center p-3 rounded-xl">
                <i class="fas fa-chart-line w-8"></i>
                <span>Dashboard</span>
            </a>
            <a href="{{url_for('auth.buku')}}" class="nav-item flex items-center p-3 rounded-xl">
                <i class="fas fa-book w-8"></i>
                <span>Data Buku</span>
            </a>
            <a href="{{url_for('auth.anggota')}}" class="nav-item active flex items-center p-3 rounded-xl">
                <i class="fas fa-users w-8"></i>
                <span>Data Anggota</span>
            </a>
            <a href="{{url_for('auth.peminjaman')}}" class="nav-item flex items-center p-3 rounded-xl">
                <i class="fas fa-exchange-alt w-8"></i>
                <span>Data Peminjaman</span>
            </a>
            <div class="pt-4 pb-2 text-xs font-semibold uppercase text-gray-500 px-3 tracking-widest">Laporan</div>
            <a href="{{url_for('auth.laporan')}}" class="nav-item flex items-center p-3 rounded-xl">
                <i class="fas fa-file-invoice w-8"></i>
                <span>Denda & Sanksi</span>
            </a>
        </nav>

        <div class="p-6 border-t border-white/10">
            <a href="{{ url_for('auth.logout') }}" class="flex items-center text-red-400 hover:text-red-300 transition-colors">
                <i class="fas fa-sign-out-alt w-8"></i>
                <span>Keluar</span>
            </a>
        </div>
    </aside>

    <main class="flex-1 ml-64">
        <header class="bg-white shadow-sm p-4 sticky top-0 z-10 flex items-center px-10">
            <a href="{{ url_for('auth.anggota') }}" class="mr-4 text-gray-400 hover:text-amber-900 transition-colors">
                <i class="fas fa-arrow-left text-xl"></i>
            </a>
            <h1 class="serif text-2xl text-gray-800">Edit Anggota</h1>
        </header>

        <div class="p-10 max-w-2xl">
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="bg-amber-900 p-6 text-white">
                    <p class="text-sm opacity-80 uppercase tracking-widest font-semibold">Formulir Ubah Data</p>
                    <h2 class="serif text-xl">Perbarui Informasi Anggota</h2>
                </div>

                <form action="{{ url_for('auth.cedit_anggota', id_anggota=anggota.id_anggota) }}" method="POST" class="p-8 space-y-6">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase mb-2 block tracking-wider">Nama Lengkap</label>
                        <input type="text" name="nama_lengkap" value="{{ anggota.nama_lengkap }}" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-amber-700 outline-none text-gray-700 transition-all bg-gray-50 focus:bg-white" required>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="text-xs font-bold text-gray-400 uppercase mb-2 block tracking-wider">Email</label>
                            <input type="email" name="email" value="{{ anggota.email }}" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-amber-700 outline-none text-gray-700 bg-gray-50 focus:bg-white" required>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-400 uppercase mb-2 block tracking-wider">Hak Akses</label>
                            <select name="hak_akses" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-amber-700 outline-none text-gray-700 bg-gray-50 focus:bg-white cursor-pointer">
                                <option value="Anggota" {% if anggota.hak_akses == 'Anggota' %}selected{% endif %}>Anggota</option>
                                <option value="Admin" {% if anggota.hak_akses == 'Admin' %}selected{% endif %}>Admin</option>
                            </select>
                        </div>
                    </div>

                    <div class="pt-6 border-t flex space-x-4">
                        <a href="{{ url_for('auth.anggota') }}" class="flex-1 py-4 rounded-xl font-bold text-gray-500 hover:bg-gray-100 transition-all uppercase tracking-widest text-center text-xs">
                            Batalkan
                        </a>
                        <button type="submit" class="flex-1 py-4 rounded-xl font-bold bg-amber-900 text-white hover:bg-amber-800 transition-all shadow-lg shadow-amber-900/20 uppercase tracking-widest text-xs">
                            Simpan Perubahan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
